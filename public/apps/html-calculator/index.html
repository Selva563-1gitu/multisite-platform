<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .calc {
      width: 320px;
      border-radius: 20px;
      overflow: hidden;
      background: #111118;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }

    /* Display */
    .display {
      padding: 24px 20px 16px;
      background: #0d0d14;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .expression {
      font-size: 13px;
      color: #555566;
      text-align: right;
      min-height: 18px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result {
      font-size: 36px;
      font-weight: 500;
      color: #f0f0f5;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -1px;
    }

    .result.small { font-size: 26px; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.04);
    }

    /* Buttons */
    button {
      padding: 0;
      height: 72px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 18px;
      font-weight: 400;
      background: #111118;
      color: #f0f0f5;
      transition: background 0.1s, transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.93); background: #1e1e2a; }

    button.op    { color: #00d4ff; font-size: 20px; }
    button.fn    { color: #8888a0; font-size: 15px; background: #0f0f18; }
    button.fn:active { background: #1a1a26; }
    button.eq    {
      background: #00d4ff;
      color: #000;
      font-size: 22px;
      font-weight: 600;
    }
    button.eq:active { background: #00b8d9; }
    button.zero  { grid-column: span 2; }

    /* Accent dot */
    .dot {
      display: block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #00d4ff;
      margin: 0 auto 8px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expression" id="expr"></div>
      <div class="result"    id="result">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="fn" data-action="clear">AC</button>
      <button class="fn" data-action="sign">±</button>
      <button class="fn" data-action="percent">%</button>
      <button class="op" data-op="÷">÷</button>
      <!-- Row 2 -->
      <button data-num="7">7</button>
      <button data-num="8">8</button>
      <button data-num="9">9</button>
      <button class="op" data-op="×">×</button>
      <!-- Row 3 -->
      <button data-num="4">4</button>
      <button data-num="5">5</button>
      <button data-num="6">6</button>
      <button class="op" data-op="−">−</button>
      <!-- Row 4 -->
      <button data-num="1">1</button>
      <button data-num="2">2</button>
      <button data-num="3">3</button>
      <button class="op" data-op="+">+</button>
      <!-- Row 5 -->
      <button class="zero" data-num="0">0</button>
      <button data-num=".">.</button>
      <button class="eq" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const resultEl = document.getElementById('result')
    const exprEl   = document.getElementById('expr')

    let current  = '0'
    let previous = ''
    let operator = null
    let resetNext = false

    function updateDisplay() {
      resultEl.textContent = current
      resultEl.className = 'result' + (current.length > 9 ? ' small' : '')
    }

    function inputNum(n) {
      if (resetNext) { current = ''; resetNext = false }
      if (n === '.' && current.includes('.')) return
      if (current === '0' && n !== '.') { current = n }
      else { current = (current + n).slice(0, 12) }
      updateDisplay()
    }

    function setOp(op) {
      if (operator && !resetNext) calculate()
      previous = current
      operator = op
      resetNext = true
      exprEl.textContent = `${previous} ${op}`
    }

    function calculate() {
      if (!operator || !previous) return
      const a = parseFloat(previous)
      const b = parseFloat(current)
      let res
      if (operator === '+') res = a + b
      if (operator === '−') res = a - b
      if (operator === '×') res = a * b
      if (operator === '÷') res = b !== 0 ? a / b : 'Error'
      exprEl.textContent = `${previous} ${operator} ${current} =`
      current = res === 'Error' ? 'Error' : String(parseFloat(res.toFixed(10)))
      operator = null
      previous = ''
      resetNext = true
      updateDisplay()
    }

    document.querySelector('.grid').addEventListener('click', e => {
      const btn = e.target.closest('button')
      if (!btn) return
      const num    = btn.dataset.num
      const op     = btn.dataset.op
      const action = btn.dataset.action

      if (num  !== undefined) { inputNum(num); return }
      if (op   !== undefined) { setOp(op);     return }

      if (action === 'equals')  { calculate(); return }
      if (action === 'clear')   { current = '0'; previous = ''; operator = null; exprEl.textContent = ''; updateDisplay(); return }
      if (action === 'sign')    { current = String(-parseFloat(current)); updateDisplay(); return }
      if (action === 'percent') { current = String(parseFloat(current) / 100); updateDisplay(); return }
    })

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key)
      if (e.key === '.')  inputNum('.')
      if (e.key === '+')  setOp('+')
      if (e.key === '-')  setOp('−')
      if (e.key === '*')  setOp('×')
      if (e.key === '/')  { e.preventDefault(); setOp('÷') }
      if (e.key === 'Enter' || e.key === '=') calculate()
      if (e.key === 'Escape' || e.key === 'c') { current = '0'; previous = ''; operator = null; exprEl.textContent = ''; updateDisplay() }
      if (e.key === 'Backspace') { current = current.length > 1 ? current.slice(0, -1) : '0'; updateDisplay() }
    })
  </script>
</body>
</html>
