# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────
# CI/CD PIPELINE — Multi-Site DevPortal
#
# Base path is hardcoded in vite.config.js as '/multisite-platform/'
# No secrets needed for deployment.
# ─────────────────────────────────────────────────────────────

name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate app registry
        run: node scripts/generate.js

      - name: Build with Vite
        run: npm run build
        env:
          NODE_ENV: production

      - name: Add 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: false
          commit_message: "deploy: ${{ github.sha }}"

      - name: Deployment summary
        run: |
          echo "## ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://selva563-1gitu.github.io/multisite-platform/#/" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
